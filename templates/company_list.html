{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="{% static 'css/style.css' %}?v={% now 'U' %}"
    />
  </head>
  <body>
    <header>
      <h1>Company Records</h1>
    </header>
    <main>
      <section class="form-section">
        <form action="" method="post">
          {% csrf_token %}
          <h2>Add Company</h2>
          <label>Name</label>
          <input type="text" id="name" placeholder="Company Name" /><br />

          <label>Email</label>
          <input type="email" id="email" placeholder="Email" /><br />

          <label>Phone</label>
          <input type="text" id="phone" placeholder="Phone" /><br />

          <label>PAN No</label>
          <input type="text" id="pan_no" placeholder="PAN Number" /><br />

          <label>Address</label>
          <input type="text" id="address" placeholder="Address" /><br />

          <label>Established Date</label>
          <input type="date" id="established" /><br />

          <label>Company Type</label>
          <select id="company_type">
            <option>Select Type</option>
          </select>

          <label>Image</label>
          <input type="file" id="image" accept="image/*" /><br />

          <button id="submitBtn">Add Company</button>
        </form>
      </section>

      <section class="list-section">
        <h2>Company List</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>ABC123</td>
              <td>Test Company</td>
              <td>test@mail.com</td>
              <td>9800000000</td>
              <td>Kathmandu</td>
              <td>IT</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
    <script src="{% static 'js/company.js' %}"></script>
  </body>
</html>
